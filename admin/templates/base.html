<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IOC Admin</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .tab-btn { transition: all .15s; }
    .tab-btn.active { background: #1e40af; color: #fff; }
    .tab-btn:not(.active):hover { background: #1e293b; }
  </style>
</head>
<body class="min-h-screen font-mono text-sm">

  <!-- header -->
  <header class="flex items-center justify-between px-6 py-3 bg-slate-900 border-b border-slate-700">
    <div class="flex items-center gap-3">
      <span class="text-blue-400 text-lg">🛡</span>
      <span class="text-white font-bold tracking-wide">IOC Admin</span>
    </div>
    <div class="flex items-center gap-2 text-slate-400 text-xs">
      <span id="refresh-indicator" class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
      Auto-refresh 10s
    </div>
  </header>

  <!-- tab bar -->
  <nav class="flex gap-1 px-6 py-2 bg-slate-900 border-b border-slate-700">
    <button id="tab-operational"
            class="tab-btn active px-4 py-1.5 rounded text-xs font-semibold"
            onclick="switchTab('operational', this)">
      ⚙ Operational
    </button>
    <button id="tab-security"
            class="tab-btn px-4 py-1.5 rounded text-xs font-semibold"
            onclick="switchTab('security', this)">
      🔒 Security
    </button>
  </nav>

  <!-- content -->
  <main class="p-6">
    <div id="content"
         hx-get="/partials/operational"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="text-slate-500 text-center mt-20">Loading…</div>
    </div>
  </main>

  <script>
    let currentTab = 'operational';

    function switchTab(tab, btn) {
      // update button styles
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = tab;
      // load partial immediately, then let the 10s poll take over
      htmx.ajax('GET', '/partials/' + tab, { target: '#content', swap: 'innerHTML' });
    }

    // global 10-second poll — always fetches the active tab
    setInterval(() => {
      htmx.ajax('GET', '/partials/' + currentTab, { target: '#content', swap: 'innerHTML' });
    }, 10000);
  </script>
</body>
</html>
